<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dialogue Builder</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="history" id="history"></div>

<div class="container">
	<h2>Dialogue Builder</h2>

</div>

<script src="script.js"></script>
</body>
</html>
